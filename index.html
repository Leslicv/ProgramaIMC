<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - IMC Saludable</title>
  <link rel="stylesheet" href="login.css">
</head>
<body>

  <main class="login-page">

    <section class="login-card">

      <img src="img/logo.png" alt="Insignia del colegio" class="logo-colegio">

      <h1></h1>
      <h2>Programa IMC Saludable</h2>

      <p class="descripcion">
        Ingresa tu nombre para acceder al portal de salud.
      </p>

      <div class="input-group">
        <span>👤</span>
        <input type="text" id="nombreUsuario" placeholder="Nombre completo">
      </div>

      <button onclick="ingresar()">Entrar</button>

      <div class="login-footer">
        <p>Tu bienestar importa dentro y fuera del aula.</p>
        <small>I.E.P. Parroquial Cocharcas · 2026</small>
      </div>

    </section>

  </main>

  <script src="login.js"></script>
</body>
</html>
